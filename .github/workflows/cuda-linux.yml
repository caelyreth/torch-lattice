name: CUDA Linux

on:
  pull_request:
    paths:
      - .github/workflows/cuda-linux.yml
      - CMakeLists.txt
      - pyproject.toml
      - uv.lock
      - torch_lattice/**
      - benchmarks/**
      - conformance/**
      - tests/**
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  UV_FROZEN: "1"
  UV_LINK_MODE: copy
  CUDA_VERSION: "12.8.0"
  CMAKE_BUILD_PARALLEL_LEVEL: "4"
  CMAKE_GENERATOR: Ninja
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  CCACHE_COMPRESS: "1"
  CCACHE_MAXSIZE: "2G"

jobs:
  build-test:
    name: Build and test CUDA Linux wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: 0.11.25
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network

      - name: Check CUDA toolkit
        run: |
          test -n "$CUDA_PATH"
          "$CUDA_PATH/bin/nvcc" --version

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ccache ninja-build
          ccache --version
          ninja --version

      - name: Restore native build cache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-cuda-${{ env.CUDA_VERSION }}-ccache-${{ hashFiles('CMakeLists.txt', 'pyproject.toml', 'torch_lattice/backend/**') }}
          restore-keys: |
            ${{ runner.os }}-cuda-${{ env.CUDA_VERSION }}-ccache-

      - name: Check tag matches project version
        if: startsWith(github.ref, 'refs/tags/v')
        run: test "${GITHUB_REF_NAME#v}" = "$(uv version --short)"

      - name: Build CUDA Linux distributions
        run: |
          rm -rf dist
          uv build \
            --sdist \
            --wheel \
            --out-dir dist \
            --config-setting=cmake.define.CMAKE_CUDA_COMPILER="$CUDA_PATH/bin/nvcc" \
            --config-setting=cmake.define.CUDAToolkit_ROOT="$CUDA_PATH" \
            --config-setting=cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            --config-setting=cmake.define.CMAKE_CUDA_COMPILER_LAUNCHER=ccache
          ccache --show-stats --verbose

      - name: Create wheel test environment
        run: |
          uv venv "$RUNNER_TEMP/wheel-test"
          uv pip install \
            --python "$RUNNER_TEMP/wheel-test/bin/python" \
            --torch-backend cu128 \
            "pytest>=9.0" \
            dist/torch_lattice-*.whl
          uv pip install \
            --python "$RUNNER_TEMP/wheel-test/bin/python" \
            --no-deps \
            -e benchmarks \
            -e conformance

      - name: Run CPU-safe test suite from wheel
        run: |
          export PATH="$RUNNER_TEMP/wheel-test/bin:$PATH"
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/wheel-test/bin/python" - <<'PY'
          import torch_lattice

          assert 'site-packages' in torch_lattice.__file__, torch_lattice.__file__
          PY
          "$RUNNER_TEMP/wheel-test/bin/python" -m pytest \
            "$GITHUB_WORKSPACE/tests" \
            -q \
            --import-mode=importlib

      - name: Inspect wheel linkage
        run: |
          wheel="$(ls dist/torch_lattice-*.whl)"
          python -m zipfile -e "$wheel" .wheel-linkage
          extension="$(find .wheel-linkage/torch_lattice -name 'backend*.so' -print -quit)"
          test -n "$extension"
          ldd "$extension"

      - name: Smoke test wheel import
        run: |
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/wheel-test/bin/python" - <<'PY'
          import torch
          import torch_lattice
          import torch_lattice.backend as backend

          assert torch_lattice.__version__
          assert torch.version.cuda is not None
          assert backend is not None
          PY

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: cuda-linux-distributions
          path: dist/*
          if-no-files-found: error
          compression-level: 0

  github-release:
    name: Attach CUDA Linux distributions to release
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: cuda-linux-distributions
          path: dist

      - name: Create release if needed
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Attach distributions
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
